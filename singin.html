<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Ulasan Pengetahuan</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <div class="wrapper">
      <form action="">
        <h1>Register</h1>

        <div class="input-box">
          <i data-feather="user" class="input-icon"></i>
          <input type="text" placeholder="Username" required />
        </div>

        <div class="input-box">
          <i data-feather="at-sign" class="input-icon"></i>
          <input type="text" placeholder="E-mail" required />
        </div>

        <div class="input-box">
          <i data-feather="lock" class="input-icon"></i>
          <input type="password" placeholder="Password" required />
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox" />I've read and agree to </label>
          <a href="#"> Terms & Conditions</a>
        </div>

        <button type="summit" class="btn">Create Account</button>

        <div class="register-link">
          <p>Already have an account? <a href="#">Sign In</a></p>
        </div>
      </form>
    </div>

    <script>
      feather.replace();
    </script>
  </body>
</html>
